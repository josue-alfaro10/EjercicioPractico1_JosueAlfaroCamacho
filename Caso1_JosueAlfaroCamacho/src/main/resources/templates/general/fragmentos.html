<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"      
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:fragment="head">
        <title>Salon de Belleza JAC</title>
        <meta charset="UTF-8"/>
        <link th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" rel="stylesheet"/>
        <link th:href="@{/webjars/font-awesome/7.0.0/css/all.css}" rel="stylesheet"/>
        <script th:src="@{/js/rutinas.js}"></script>
        <script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
        <script th:src="@{/webjars/popper.js/2.11.7/umd/popper.min.js}"></script>
        <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.min.js}"></script>        
    </head>
    <body>
    <!-- Header -->
    <header th:fragment="header">
        <h1 class="text-center p-3 bg-light">Salón de Belleza</h1>
    </header>

    <!-- Navbar con formulario -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">Salón Belleza</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" 
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <!-- Opciones -->
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" th:href="@{/}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/categorias}">Categorías</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/servicios}">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/reservas}">Reservas</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/contacto}">Contacto</a></li>
                </ul>

                <!-- Formulario en el navbar -->
                <form class="d-flex" th:action="@{/contacto}" method="post">
                    <div class="mb-3 me-2">
                        <label for="emailNavbar" class="form-label text-dark">Correo</label>
                        <input type="email" class="form-control" id="emailNavbar" name="email" required>
                        <div id="emailHelp" class="form-text">Nunca compartiremos tu correo.</div>
                    </div>
                    <div class="mb-3 me-2">
                        <label for="mensajeNavbar" class="form-label text-dark">Mensaje</label>
                        <input type="text" class="form-control" id="mensajeNavbar" name="mensaje" required>
                    </div>
                    <div class="mb-3 form-check me-2">
                        <input type="checkbox" class="form-check-input" id="checkNavbar">
                        <label class="form-check-label" for="checkNavbar">Acepto términos</label>
                    </div>
                    <button type="submit" class="btn btn-primary">Enviar</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="container mt-4">
        <h2 class="text-center">Bienvenido al Salón de Belleza</h2>
        <p class="text-center">Descubre nuestros servicios y promociones especiales.</p>

        <!-- Promoción destacada -->
        <section class="mt-5 text-center">
            <h3>Servicio Destacado</h3>
            <p>Balayage con descuento especial este mes.</p>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/VIDEO_ID"
                    title="Promoción Balayage" frameborder="0" allowfullscreen></iframe>
        </section>
    </main>

    <!-- Footer -->
    <footer th:fragment="footer" class="p-2 mt-5 bg-info text-white">
        <p class="lead text-center">[[#{app.footer}]] &COPY;</p>
    </footer>
</body>
</html>
