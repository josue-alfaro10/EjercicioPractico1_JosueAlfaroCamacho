<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>

    <body style="background-color:#fdf6ec;">

        <div th:replace="~{general/fragmentos :: header}"></div>
        <div th:replace="~{general/fragmentos :: navbar}"></div>

        <div class="container mt-5">

            <h2 class="text-center mb-4"
                style="color:#6b4f4f;">
                Contacto
            </h2>

            <div class="card shadow p-4">

                <form>

                    <div class="mb-3">
                        <label>Nombre</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Correo</label>
                        <input type="email" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Mensaje</label>
                        <textarea class="form-control"
                                  rows="4"></textarea>
                    </div>

                    <button type="submit"
                            class="btn"
                            style="background-color:#d4af37; color:white;">
                        Enviar
                    </button>

                </form>

            </div>

        </div>

        <div th:replace="~{general/fragmentos :: footer}"></div>

    </body>
</html>
