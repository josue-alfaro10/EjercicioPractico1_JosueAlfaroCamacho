<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>

    <body style="background-color:#fdf6ec;">

        <div th:replace="~{general/fragmentos :: header}"></div>
        <div th:replace="~{general/fragmentos :: navbar}"></div>

        <div class="container mt-5">

            <h2 class="text-center mb-4" style="color:#6b4f4f;">
                Guardar Servicio
            </h2>

            <div class="card shadow p-4">

                <form th:action="@{/servicio/guardar}"
                      th:object="${servicio}"
                      method="post">

                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <input type="text"
                               th:field="*{nombre}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Precio</label>
                        <input type="number"
                               step="0.01"
                               th:field="*{precio}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <select th:field="*{categoria.id}"
                                class="form-select">

                            <option th:each="cat : ${categorias}"
                                    th:value="${cat.id}"
                                    th:text="${cat.nombre}">
                            </option>

                        </select>
                    </div>

                    <button type="submit"
                            class="btn"
                            style="background-color:#d4af37; color:white;">
                        Guardar
                    </button>

                    <a th:href="@{/servicio/listado}"
                       class="btn btn-secondary">
                        Cancelar
                    </a>

                </form>

            </div>

        </div>

        <div th:replace="~{general/fragmentos :: footer}"></div>

    </body>
</html>
